# ----------------------------------------------------- 
# Reglas de Ventana (Window Rules) y Opacidad
# ----------------------------------------------------- 

# -- Terminal Ghostty --
# Opacidad: 85% cuando la ventana está activa, 70% cuando está inactiva.
# Esto expone el fondo y activa automáticamente el efecto blur definido en appearance.conf
windowrule = match:class ^(com.mitchellh.ghostty|ghostty)$, opacity 0.85 0.70

# -- Autenticador KDE Polkit --
# Vital: Forzar al centro, para que no pierda el foco accidentalmente
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, float 1, center 1, pin 1

# -- Herramientas del Sistema --
# Forzar a modo ventana flotante para que no interrumpan el flujo de trabajo (tiling)
windowrule = match:class ^(pavucontrol)$, float 1
windowrule = match:class ^(blueman-manager)$, float 1
windowrule = match:class ^(nm-applet)$, float 1
windowrule = match:class ^(nm-connection-editor)$, float 1

# Dimensiones y posición por defecto para herramientas flotantes
windowrule = match:class ^(pavucontrol|blueman-manager)$, size 800 600, center 1

# -- Excepciones Estéticas --
# Deshabilitar opacidad para el explorador web (Brave) para no afectar contenido multimedia
windowrule = match:class ^(Brave-browser|brave-browser)$, opacity 1.0 1.0

# -- Rofi --
# Forzar a modo flotante y centrado
windowrule = match:class ^(Rofi|rofi)$, float 1, center 1

# -- Waybar (Layer Rules) --
# En Hyprland v0.54+ el blur por capas se configura con 'blurls' en appearance.conf
# Ver: decoration { blur { ... } } y la directiva blurls = waybar
