# ----------------------------------------------------- 
# Animaciones (Modernas y fluidas, curvas Bezier)
# ----------------------------------------------------- 
animations {
    enabled = true

    # Curvas Bezier base: rápidas ("snappy") con desvanecimiento suave.
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1.0
    bezier = quick, 0.15, 0, 0.1, 1

    # Curva con rebote elástico (overshoot): Y2 = 1.1 supera brevemente
    # el valor final antes de asentarse — genera el efecto "spring".
    bezier = overshot, 0.05, 0.9, 0.1, 1.1

    # Sistema / bordes / capas: mantienen easeOutQuint (sin rebote, más neutro)
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = fade, 1, 3.03, quick
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.49, almostLinear
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade

    # Ventanas: rebote elástico al abrir, salida rápida y limpia
    animation = windows, 1, 4, overshot
    animation = windowsIn, 1, 4, overshot, popin 80%
    animation = windowsOut, 1, 1.49, linear, popin 87%

    # Workspaces: slide con rebote — da sensación de peso y profundidad
    animation = workspaces, 1, 5, overshot, slide
    animation = workspacesIn, 1, 5, overshot, slide
    animation = workspacesOut, 1, 3, easeOutQuint, slide
}
