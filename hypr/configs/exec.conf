# exec.conf
# Autostart de aplicaciones

# --- Autenticador ---
# Polkit de KDE (eliminando la dependencia de XFCE)
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# --- Entorno y UI ---
# Barra de estado
exec-once = waybar
# Demonio de notificaciones
exec-once = mako
# Gestor de energía y bloqueo
exec-once = hypridle

# --- Fondos de Pantalla + Cursor (Arranque Seguro) ---
# 1) Iniciar el demonio primero y dejar que cree su socket
exec-once = awww-daemon
# 2) Restaurar el último wallpaper y sincronizar cursor vía script de persistencia
exec-once = ~/.config/hypr/scripts/init_wallpaper.sh

# --- Portapapeles ---
# Iniciar wl-paste escuchando cambios y guardándolos en cliphist
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Nota: el cursor ahora se aplica dentro de init_wallpaper.sh al finalizar.

