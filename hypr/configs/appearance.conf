# appearance.conf
# Estética Cybersigilism: colores, bordes y blur

general {
    # Espacios entre ventanas y bordes
    gaps_in = 5
    gaps_out = 10
    
    # Grosor del borde de las ventanas
    border_size = 2

    # --- Paleta de Colores Cybersigilism ---
    # Morado neón para el borde activo, con un toque de rosa
    col.active_border = rgba(cba6f7ff) rgba(f5c2e7ff) 45deg
    # Gris oscuro para ventanas inactivas
    col.inactive_border = rgba(313244ff)

    # Comportamiento de distribución de ventanas
    layout = dwindle
}

decoration {
    # Esquinas ligeramente redondeadas
    rounding = 8
    
    # --- Blur Optimizado ---
    # Se aplicará solo a las ventanas que soporten y tengan configurada transparencia
    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
        ignore_opacity = false
    }

    # --- Sombras ---
    # Sombras sutiles para dar profundidad sin ser invasivas
    shadow {
        enabled = true
        range = 10
        render_power = 3
        color = rgba(11111bee) # Fondo base oscuro con opacidad
    }
}

# -- Blur en capas (Waybar) --
# En Hyprland v0.54+ se usa 'blurls' para aplicar blur del compositor a capas del sistema
blurls = waybar
