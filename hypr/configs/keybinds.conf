# keybinds.conf
# Atajos de teclado

$mainMod = SUPER

# --- Aplicaciones Principales ---
bind = $mainMod, Return, exec, ghostty
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod, B, exec, brave
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpapers.sh
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod, E, exec, dolphin
bind = $mainMod, L, exec, hyprlock

# --- Gestión de Ventanas ---
bind = $mainMod, Q, killactive,
# Forzar cierre: usamos kill en la ventana activa o podemos forzar hyprctl kill (equivalente a xkill)
bind = $mainMod SHIFT, Q, exec, hyprctl kill
bind = $mainMod, Space, togglefloating,
bind = $mainMod, F, fullscreen,

# --- Menú de Apagado y Salida ---
bind = $mainMod, Escape, exec, wlogout -b 4
bind = CTRL ALT, Delete, exit,

# --- Foco de Ventanas ---
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# --- Espacios de Trabajo ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Opciones de Workspaces (Permite volver al anterior al apretar el mismo número)
binds {
    workspace_back_and_forth = true
}

# --- Mover ventanas a espacios de trabajo ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --- Capturas de Pantalla ---
# Pantalla completa
bind = , Print, exec, grim - | swappy -f -
# Segmento de pantalla
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | swappy -f -

# --- Hardware y Multimedia ---
# Volumen
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# Brillo
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# --- Tasa de Refresco ---
bind = $mainMod, F5, exec, ~/.config/hypr/scripts/refresh_rate.sh # Script pendiente de crear

# --- Mouse ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ---Recargar Waybar ---
bind = SUPER SHIFT, B, exec, killall -SIGUSR2 waybar

# --- Selector de Temas Waybar ---
bind = SUPER CTRL, B, exec, ~/.config/waybar/scripts/theme-selector.sh
