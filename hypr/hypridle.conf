# hypridle.conf — Gestión de energía para Hyprland
# Sintaxis oficial: https://wiki.hyprland.org/Hypr-Ecosystem/hypridle/

general {
    # Bloquear la sesión antes de que el sistema se suspenda
    lock_cmd         = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on

    # Respetar inhibiciones de D-Bus (videos, juegos en pantalla completa, etc.)
    # false = SÍ respeta las inhibiciones (comportamiento correcto)
    ignore_dbus_inhibit = false
}

# ─── Listener 1: Aviso de inactividad — Reducir brillo (5 min) ──────────────
listener {
    timeout   = 300   # 5 minutos

    # Guarda el brillo actual y lo lleva al mínimo (1)
    on-timeout = brightnessctl --save set 1

    # Restaura el brillo al valor guardado antes del timeout
    on-resume  = brightnessctl --restore
}

# ─── Listener 2: Apagado de pantalla — DPMS off (10 min) ────────────────────
listener {
    timeout   = 600   # 10 minutos

    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}
